name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint · type-check · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src/ scripts/ tests/

      - name: Mypy (type-check)
        run: mypy src/ || true

      - name: Pytest (no verifier / network markers)
        run: pytest tests/ -q -m "not verifier and not network"
